<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369 | منصة التداول</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
        }
        
        header { grid-column: 1 / -1; background: #16213e; padding: 20px; border-radius: 15px; text-align: center; font-size: 1.8em; color: #4ecca3; }
        
        section { background: #1b1b2f; padding: 20px; border-radius: 15px; border: 1px solid #333; min-height: 150px; }
        
        /* الصندوق المخصص للرسم البياني */
        .trading-engine { grid-column: 1 / -1; height: 450px; }
        
        h3 { margin-top: 0; color: #e94560; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .price-box { font-size: 1.5em; font-weight: bold; margin-top: 15px; }
        
        .market-ticker { grid-column: 1 / -1; background: #0f3460; padding: 10px; overflow: hidden; white-space: nowrap; border-radius: 10px; }
        .ticker-text { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

<div class="dashboard-grid">
    <header>AETHER 369</header>
    
    <section><h3>رصيد المحفظة</h3><div class="price-box">$1,250.00</div></section>
    <section><h3>أسعار الأسواق الحية</h3><div class="price-box">بيتكوين (BTC): <span id="btc-price">جاري التحميل...</span> $</div></section>
    
    <!-- محرك التداول الاحترافي -->
    <section class="trading-engine">
        <h3>محرك التداول الاحترافي</h3>
        <div class="tradingview-widget-container" style="height:90%;width:100%;">
            <div id="tradingview_chart" style="height:100%;width:100%;"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BINANCE:BTCUSDT",
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "ar",
                    "toolbar_bg": "#16213e",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart"
                });
            </script>
        </div>
    </section>
    
    <footer class="market-ticker">
        <div class="ticker-text" id="ticker">
            BTC: جاري التحديث | ETH: جاري التحديث | S&P 500: متصل | السوق في حالة نشاط...
        </div>
    </footer>
</div>

<script>
    function updatePrice() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
            .then(res => res.json())
            .then(data => {
                document.getElementById('btc-price').innerText = parseFloat(data.price).toLocaleString();
            });
    }
    setInterval(updatePrice, 3000);
    updatePrice();
</script>

</body>
</html>
