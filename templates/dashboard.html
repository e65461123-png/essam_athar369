<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER 369 | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .neon-glow { text-shadow: 0 0 12px rgba(34, 197, 94, 0.6); }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 min-h-screen flex flex-col justify-between">

    <header class="border-b border-gray-800 bg-[#111827] p-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-green-400">AETHER 369</span>
        </div>
        <span class="bg-gray-800 text-xs text-yellow-400 px-3 py-1 rounded-full border border-yellow-400/30">لوحة المسؤول</span>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 w-full max-w-md mx-auto">
        
        <div class="w-full bg-[#111827] border border-gray-800 rounded-2xl p-6 shadow-2xl space-y-6">
            
            <div class="text-center space-y-1">
                <p class="text-gray-400 text-sm">مرحباً بك في نظام الإدارة</p>
                <h2 class="text-xl font-bold text-white">Welcome {{ data.username }} 👋</h2>
            </div>

            <div class="bg-[#1f2937]/50 rounded-xl p-4 text-center border border-gray-800">
                <span class="text-xs text-gray-400 block mb-1">إجمالي الرصيد المؤمن (SAFU)</span>
                <span class="text-3xl font-bold text-green-400 neon-glow tracking-tight">USD {{ data.balance }}</span>
            </div>

            <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 flex items-start gap-3">
                <div class="bg-yellow-500/20 p-2 rounded-lg text-yellow-400 text-lg">🛡️</div>
                <div>
                    <h4 class="text-sm font-bold text-yellow-400">نظام حماية AETHER الآمن</h4>
                    <p class="text-xs text-gray-400 mt-0.5">جميع الأصول مشفرة ومؤمنة بالكامل في الخزنة الإدارية المحمية.</p>
                </div>
            </div>

            <div class="pt-2 space-y-3">
                <button class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 rounded-xl transition duration-200 active:scale-95 shadow-lg shadow-green-500/20">
                    إدارة المحافظ والعملات
                </button>
                
                <button class="w-full bg-red-500/10 hover:bg-red-500/20 text-red-400 font-medium py-3 rounded-xl border border-red-500/20 transition duration-200 active:scale-95">
                    تسجيل الخروج
                </button>
            </div>

        </div>

    </main>

    <footer class="p-4 text-center text-xs text-gray-600 border-t border-gray-900 bg-[#0d1321]">
        منصة AETHER 369 &copy; 2026 | تشفير كامل للبيانات ومراقبة الأداء الفوري.
    </footer>

</body>
</html>
