<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع الأبطال 🔥</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: #22223b; padding: 25px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(127, 90, 240, 0.3); }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border-radius: 10px; border: none; }
        button { background: #7f5af0; color: #fff; padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; }
        .msg { background: #2d2d44; padding: 10px; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 مرحباً بك!</h2>
        <form method="POST">
            <input type="text" name="user" placeholder="اسمك" required>
            <textarea name="content" placeholder="اكتب أي حاجة..." required></textarea>
            <button type="submit">💥 انشر الرسالة</button>
        </form>
        <hr>
        <h3>📜 رسائل الأبطال:</h3>
        {% for msg in messages %}
            <div class="msg">
                <strong>{{ msg.user }}</strong>: {{ msg.content }} <br>
                <small style="color: #aaa;">{{ msg.timestamp }}</small>
            </div>
        {% endfor %}
    </div>
</body>
</html>
