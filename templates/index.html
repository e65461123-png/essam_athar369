<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .price-box { font-size: 3em; color: #4ecca3; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AETHER 369</h1>
    <div class="price-box">بيتكوين: <span id="btc-price">جاري التحميل...</span> $</div>

    <script>
        function updatePrice() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('btc-price').innerText = parseFloat(data.price).toLocaleString();
                });
        }
        setInterval(updatePrice, 1000); // تحديث كل ثانية
        updatePrice();
    </script>
</body>
</html>
