<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369 | منصة التداول الشاملة</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .full-width { grid-column: span 2; background: #16213e; padding: 15px; border-radius: 10px; }
        .card { background: #1b1b2f; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h3 { color: #e94560; margin-top: 0; font-size: 0.9em; }
        .price { font-size: 1.2em; color: #4ecca3; font-weight: bold; }
        .ticker { background: #0f3460; padding: 10px; border-radius: 5px; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

<div class="grid-container">
    <!-- الرصيد -->
    <header class="full-width">
        <h3>رصيد محفظتك</h3>
        <div class="price">$1,250.00</div>
    </header>

    <!-- الأسواق -->
    <section class="card">
        <h3>أسعار الأسواق</h3>
        <div class="price">BTC: <span id="btc-price">...</span> $</div>
    </section>

    <!-- الأمن -->
    <section class="card">
        <h3>إدارة الأمن</h3>
        <div style="color: #4ecca3;">مستوى الحماية: 33</div>
    </section>

    <!-- محرك التداول (TradingView) -->
    <section class="full-width" style="height: 300px;">
        <h3>محرك التداول الاحترافي</h3>
        <div id="tv_chart" style="height: 250px;"></div>
    </section>

    <!-- شريط الأخبار -->
    <footer class="full-width ticker">
        تحديثات السوق: الذهب (2,345) | الفضة (15.20) | EGP Stabilizing...
    </footer>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    // تحديث السعر
    function updateData() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
            .then(res => res.json())
            .then(data => { document.getElementById('btc-price').innerText = parseFloat(data.price).toLocaleString(); });
    }
    
    // تشغيل الرسم البياني
    new TradingView.widget({"container_id": "tv_chart", "symbol": "BINANCE:BTCUSDT", "theme": "dark", "autosize": true});
    
    setInterval(updateData, 3000);
    updateData();
</script>

</body>
</html>
