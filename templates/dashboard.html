
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | AETHER 369</title>
</head>
<body>
    <h1>مرحباً بك، {{ user.username }}</h1>
    <h2>رصيد محفظتك: {{ wallet.balance_usd }} دولار</h2>

    <hr>
    <h3>إيداع رصيد (USD)</h3>
    <form action="/deposit" method="POST">
        <input type="number" step="0.01" name="amount" placeholder="أدخل المبلغ" required>
        <button type="submit">تأكيد الإيداع</button>
    </form>

    <br>
    <a href="/logout">تسجيل الخروج</a>
</body>
</html>
