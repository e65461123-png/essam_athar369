<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; }
        .login-box { text-align: center; margin-top: 100px; }
        input { padding: 10px; margin: 5px; background: #222; border: 1px solid #00ff41; color: #fff; }
        .dashboard { display: none; padding: 20px; }
        .ticker { background: #111; padding: 10px; overflow: hidden; border: 1px solid #00ff41; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #333; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<!-- صفحة الدخول -->
<div id="loginPage" class="login-box">
    <h2>تسجيل دخول الإدارة</h2>
    <input type="text" id="user" placeholder="User: Essam">
    <input type="password" id="pass" placeholder="Pass: 369369">
    <button onclick="check()">دخول</button>
</div>

<!-- لوحة التحكم -->
<div id="dash" class="dashboard">
    <div class="ticker" id="time-ticker"></div>
    <div class="grid">
        <div class="card"><h3>الرصيد</h3><p>{{ balance }}$</p></div>
        <div class="card"><h3>سعر الذهب</h3><p id="gold">2350.00$</p></div>
    </div>
    <button onclick="fetch('/activate-flow', {method: 'POST'}).then(() => location.reload())" style="margin-top:20px; width:100%; padding:15px;">إيداع جديد</button>
</div>

<script>
    function check() {
        if(document.getElementById('user').value == 'Essam' && document.getElementById('pass').value == '369369') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dash').style.display = 'block';
        } else { alert('خطأ في البيانات'); }
    }
    setInterval(() => {
        let now = new Date();
        document.getElementById('time-ticker').innerText = "التوقيت الحالي: " + now.toLocaleTimeString() + " | الذهب يتحرك...";
        document.getElementById('gold').innerText = (2350 + Math.random()).toFixed(2) + "$";
    }, 1000);
</script>
</body>
</html>
