<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-align: center; }
        .container { border: 2px solid #00ff41; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,255,65,0.2); max-width: 500px; margin: auto; }
        h1 { margin-bottom: 20px; letter-spacing: 2px; }
        .balance { font-size: 3em; margin: 20px 0; font-weight: bold; }
        button { background: #00ff41; border: none; padding: 15px 30px; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.2em; width: 100%; }
        button:hover { background: #008f11; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ATHEER 369</h1>
        <div class="balance">{{ balance }}$</div>
        <button onclick="fetch('/activate-flow', {method: 'POST'}).then(() => location.reload())">
            تفعيل التدفق المالي
        </button>
    </div>
</body>
</html>
