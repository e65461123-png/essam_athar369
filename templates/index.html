<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER 369 | المنصة العملاقة</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .hero { background: linear-gradient(135deg, #1b1b2f, #0f3460); padding: 50px 20px; border-radius: 25px; border: 2px solid #e94560; box-shadow: 0 0 20px rgba(233, 69, 96, 0.3); max-width: 500px; margin: auto; }
        h1 { font-size: 3em; color: #e94560; margin-bottom: 10px; }
        .price-box { font-size: 2.5em; color: #4ecca3; margin: 30px 0; font-weight: bold; background: #16213e; padding: 15px; border-radius: 15px; }
        .poem { color: #bdc3c7; font-style: italic; font-size: 1.1em; line-height: 1.8; margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AETHER 369</h1>
        <div class="price-box">بيتكوين: {{ btc_price }} $</div>
        <div class="poem">
            <p>لا خيرَ في عيشٍ تجرعهُ ذلٌ .. وإن كان في أعلا المراتبِ مأواهُ</p>
            <p>الشهامةُ تاجٌ لا يرتديهِ إلا .. من كان للوفاءِ صدىً في دنياهُ</p>
        </div>
    </div>
</body>
</html>
