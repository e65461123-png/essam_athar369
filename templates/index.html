<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>غرفة التحكم - ATHEER 369</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00FF00; padding: 20px; width: 90%; max-width: 500px; margin: auto; box-shadow: 0 0 15px #00FF00; }
        .radar { width: 200px; height: 200px; border: 2px solid #00FF00; border-radius: 50%; margin: 20px auto; position: relative; overflow: hidden; }
        .radar::after { content: ''; position: absolute; width: 100%; height: 2px; background: #00FF00; top: 50%; transform-origin: right; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        button { background: #00FF00; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        h1, h2 { color: gold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ATHEER 369</h1>
        <p>SYSTEM STATUS: ONLINE</p>
        <div class="radar"></div>
        <p>SECURITY: AES-256 BIT ENCRYPTED</p>
        <hr>
        <h2>غرفة التحكم والسيطرة</h2>
        <p>القائد: عصام الكومي</p>
        <p>رصيد المحفظة: USD 369.00</p>
        <button>تفعيل بوابة التدفق المالي</button><br>
        <button style="background: gold;">مراسلة غرفة القيادة (GMAIL)</button>
    </div>
</body>
</html>
