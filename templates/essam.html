<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; }
        .box { border: 1px solid #00ff41; padding: 20px; max-width: 400px; margin: 100px auto; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px; background: #222; border: 1px solid #00ff41; color: #fff; }
        button { width: 95%; padding: 10px; background: #00ff41; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <!-- نظام الحماية الخاص بك -->
    <div id="auth" class="box">
        <h3>بوابة ATHEER 369 | دخول القيادة</h3>
        <input type="text" id="u" placeholder="Essam">
        <input type="password" id="p" placeholder="369369">
        <button onclick="check()">دخول</button>
    </div>

    <!-- لوحة التحكم الحقيقية -->
    <div id="main" class="box" style="display:none;">
        <h3>غرفة القيادة</h3>
        <p>الرصيد: {{ balance }}$</p>
        <p>الخزنة: <span id="vault">********</span></p>
        <button onclick="document.getElementById('vault').innerText='999,999$'">فتح الخزنة</button>
    </div>

    <script>
        function check() {
            if(document.getElementById('u').value == 'Essam' && document.getElementById('p').value == '369369') {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            } else { alert('خطأ في البيانات'); }
        }
    </script>
</body>
</html>
