<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369</title>
    <style>
        body { background-color: #0b0f19; color: white; font-family: sans-serif; padding: 20px; }
        input { padding: 10px; margin: 5px; }
        button { padding: 10px 20px; background: green; color: white; border: none; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <h1>PRO TRADING DASHBOARD</h1>

    <div>
        <input type="number" id="amountInput" placeholder="الكمية">
        <input type="number" id="priceInput" placeholder="السعر">
        <button onclick="sendBuyOrder()">BUY</button>
    </div>

    <table id="orderTable">
        <thead>
            <tr>
                <th>النوع</th>
                <th>الكمية</th>
                <th>السعر</th>
            </tr>
        </thead>
        <tbody id="orderBody"></tbody>
    </table>

    <script>
        function sendBuyOrder() {
            const amount = document.getElementById('amountInput').value;
            const price = document.getElementById('priceInput').value;

            fetch('/place_buy_order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: amount, price: price })
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .catch(err => console.error(err));
        }
    </script>
</body>
</html>
