<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369 | المنصة المتكاملة</title>
    <style>
        body { background: #0a0e14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .full-width { grid-column: span 2; background: #16213e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card { background: #1b1b2f; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        h3 { color: #e94560; font-size: 0.8em; margin: 0 0 10px 0; }
        .data { font-size: 1.1em; color: #4ecca3; font-weight: bold; }
        .ticker { background: #0f3460; padding: 10px; border-radius: 5px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="dashboard">
    <header class="full-width">
        <h3>رصيد محفظتك المتاح</h3>
        <div class="data">$1,250.00</div>
    </header>

    <section class="card">
        <h3>أسعار الأسواق الحية</h3>
        <div class="data">BTC: <span id="btc-price">...</span> $</div>
    </section>

    <section class="card">
        <h3>إدارة الأمن والامتثال</h3>
        <div class="data">مستوى الحماية: 33</div>
    </section>

    <section class="full-width" style="height: 250px;">
        <h3>محرك التداول الاحترافي</h3>
        <div id="tradingview_widget" style="height: 100%;"></div>
    </section>

    <footer class="full-width ticker">
        شريط الأخبار: تحديثات السوق الحية | S&P 500: 483.50 | EGP: مستقر
    </footer>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    // تحديث سعر البيتكوين
    function updatePrice() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
            .then(res => res.json())
            .then(data => { document.getElementById('btc-price').innerText = parseFloat(data.price).toLocaleString(); });
    }
    
    // ربط محرك TradingView
    new TradingView.widget({
        "container_id": "tradingview_widget",
        "symbol": "BINANCE:BTCUSDT",
        "theme": "dark",
        "autosize": true
    });

    setInterval(updatePrice, 3000);
    updatePrice();
</script>

</body>
</html>
