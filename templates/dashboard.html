<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER 369 | لوحة التحكم</title>
    <!-- استدعاء Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-4">

    <!-- العنوان واسم المستخدم -->
    <h1 class="text-xl font-bold mb-4">AETHER 369 <span class="text-sm font-normal text-gray-400">أهلاً بك، عصام الكومي</span></h1>
    
    <!-- قسم الرصيد -->
    <div class="bg-gray-800 p-6 rounded-2xl mb-6 shadow-lg">
        <p class="text-gray-400">رصيد محفظتك المتاح</p>
        <h2 class="text-4xl font-bold text-green-400 my-2">$1,250.00</h2>
        <div class="flex gap-2 mt-4">
            <button class="bg-green-500 text-black px-6 py-2 rounded-lg font-bold">إيداع أموال 📥</button>
            <button class="bg-gray-700 text-white px-6 py-2 rounded-lg font-bold">سحب الأرباح 📤</button>
        </div>
    </div>

    <!-- أسعار الأسواق الحية -->
    <div class="bg-gray-800 p-6 rounded-2xl mb-6 shadow-lg">
        <h3 class="text-gray-400 mb-4">أسعار الأسواق الحية</h3>
        <div class="flex justify-between items-center bg-gray-900 p-4 rounded-xl mb-3 border border-gray-700">
            <div>
                <p class="font-bold">البيتكوين (BTC)</p>
                <p class="text-xs text-green-500">مباشر من بينانس</p>
            </div>
            <p class="text-yellow-500 font-mono">$68,230.00</p>
        </div>
        <div class="flex justify-between items-center bg-gray-900 p-4 rounded-xl border border-gray-700">
            <div>
                <p class="font-bold">الأوقية العالمية (Gold)</p>
                <p class="text-xs text-gray-500">بورصة عالمية</p>
            </div>
            <p class="text-yellow-500 font-mono">$2,340.00</p>
        </div>
    </div>

    <!-- شريط الأمان -->
    <div class="text-center bg-gray-800 p-3 rounded-xl border border-gray-700 text-gray-400 text-sm">
        🛡️ حسابك محمي بنظام تشفير SAFU الشامل
    </div>

</body>
</html>
