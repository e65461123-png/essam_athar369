<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ATHEER 369 | غرفة العمليات</title>
    <style>
        body { background-color: #000; color: #00FF00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .container { border: 2px solid #00FF00; padding: 20px; width: 90%; max-width: 500px; margin: auto; box-shadow: 0 0 20px #00FF00; }
        .radar { width: 200px; height: 200px; border: 2px solid #00FF00; border-radius: 50%; margin: 20px auto; position: relative; overflow: hidden; background: radial-gradient(circle, #000 60%, #00FF00 100%); }
        .radar::after { content: ''; position: absolute; width: 100%; height: 2px; background: #00FF00; top: 50%; transform-origin: right; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .data { font-size: 14px; margin: 10px 0; }
        button { background: #00FF00; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; margin: 10px; width: 100%; max-width: 300px; }
        h1 { color: #fff; text-shadow: 0 0 10px #00FF00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ATHEER 369</h1>
        <div class="radar"></div>
        <div class="data" id="status">جاري الاتصال بالخادم...</div>
        <hr>
        <h2>لوحة التحكم</h2>
        <p>القائد: عصام الكومي</p>
        <p id="wallet">الرصيد: جاري التحديث...</p>
        <button onclick="window.location.href='mailto:your-email@gmail.com'">مراسلة غرفة القيادة (GMAIL)</button>
        <button style="background: gold;" onclick="alert('جاري تفعيل التدفق المالي...')">تفعيل بوابة التدفق المالي</button>
    </div>
    <script>
        // تحديث البيانات حيوياً
        setInterval(() => {
            document.getElementById('status').innerText = "الحالة: متصل | التشفير: AES-256";
            document.getElementById('wallet').innerText = "الرصيد: USD " + (369 + Math.random()).toFixed(2);
        }, 2000);
    </script>
</body>
</html>
