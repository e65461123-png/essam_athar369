<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <style>
        body { background-color: #000; color: #00FF00; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00FF00; padding: 40px; box-shadow: 0 0 20px #00FF00; width: 300px; text-align: center; }
        input { background: #111; border: 1px solid #00FF00; color: #00FF00; padding: 10px; width: 80%; margin: 10px 0; }
        button { background: #00FF00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; width: 85%; }
        h2 { text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ATHEER 369</h2>
        <p>ACCESS TERMINAL</p>
        <form>
            <input type="text" placeholder="USER ID">
            <input type="password" placeholder="ENCRYPTION KEY">
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
