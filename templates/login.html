{% extends "base.html" %}

{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<h3 style="color: #2d3748; margin-bottom: 20px;">🔐 تسجيل الدخول</h3>

<form method="POST" action="/login" style="max-width: 400px; margin: 0 auto;">
    <div style="margin-bottom: 15px;">
        <label style="display: block; color: #4a5568; margin-bottom: 5px; font-weight: bold;">
            📧 البريد الإلكتروني
        </label>
        <input type="email" 
               name="email" 
               placeholder="example@email.com"
               required
               style="
                   width: 100%;
                   padding: 12px 16px;
                   border: 2px solid #e2e8f0;
                   border-radius: 10px;
                   font-size: 16px;
               ">
    </div>
    
    <div style="margin-bottom: 20px;">
        <label style="display: block; color: #4a5568; margin-bottom: 5px; font-weight: bold;">
            🔑 كلمة المرور
        </label>
        <input type="password" 
               name="password" 
               placeholder="••••••••"
               required
               style="
                   width: 100%;
                   padding: 12px 16px;
                   border: 2px solid #e2e8f0;
                   border-radius: 10px;
                   font-size: 16px;
               ">
    </div>
    
    <button type="submit" 
            style="
                width: 100%;
                background: #8247e5;
                color: white;
                padding: 14px;
                border: none;
                border-radius: 10px;
                font-size: 16px;
                cursor: pointer;
                transition: 0.3s;
                font-weight: bold;
            "
            onmouseover="this.style.background='#6b46c1'"
            onmouseout="this.style.background='#8247e5'">
        🚀 دخول
    </button>
</form>

<p style="text-align: center; color: #a0aec0; margin-top: 20px; font-size: 14px;">
    ليس لديك حساب؟ <a href="/register" style="color: #8247e5; text-decoration: none;">سجل الآن</a>
</p>
{% endblock %}
