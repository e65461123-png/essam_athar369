<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER 369 | المنصة الشاملة</title>
</head>
<body style="background: #0a0e14; color: #fff; margin: 0; padding: 10px; font-family: sans-serif;">

    <!-- 1. صف الرصيد -->
    <div style="background: #16213e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333;">
        <div style="font-size: 0.7em; color: #e94560;">رصيد محفظتك المتاح</div>
        <div style="font-size: 1.6em; font-weight: bold; color: #4ecca3;">$1,250.00</div>
    </div>

    <!-- 2. صف الأسواق والأمن -->
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <div style="flex: 1; background: #1b1b2f; padding: 10px; border-radius: 10px; border: 1px solid #333;">
            <div style="font-size: 0.7em; color: #e94560;">أسعار الأسواق</div>
            <div id="btc-price" style="font-size: 1em; color: #4ecca3;">BTC: جاري التحميل...</div>
        </div>
        <div style="flex: 1; background: #1b1b2f; padding: 10px; border-radius: 10px; border: 1px solid #333;">
            <div style="font-size: 0.7em; color: #e94560;">إدارة الأمن</div>
            <div style="font-size: 1em; color: #4ecca3;">مستوى الحماية: 33</div>
        </div>
    </div>

    <!-- 3. محرك التداول -->
    <div style="background: #16213e; padding: 5px; border-radius: 10px; margin-bottom: 10px; height: 260px; border: 1px solid #333;">
        <div id="tradingview_widget" style="width: 100%; height: 100%;"></div>
    </div>

    <!-- 4. شريط المعلومات -->
    <div style="background: #0f3460; padding: 10px; border-radius: 5px; font-size: 0.7em; text-align: center; color: #fff;">
        تحديثات السوق: S&P 500: 483.50 | الذهب: 2,345 | AETHER 369 متصل
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // تحديث السعر
        function updatePrice() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(res => res.json())
                .then(data => { document.getElementById('btc-price').innerText = 'BTC: ' + parseFloat(data.price).toLocaleString(); });
        }
        
        // تشغيل المحرك
        new TradingView.widget({
            "container_id": "tradingview_widget",
            "symbol": "BINANCE:BTCUSDT",
            "theme": "dark",
            "autosize": true
        });

        setInterval(updatePrice, 3000);
        updatePrice();
    </script>
</body>
</html>
